user www-data;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # Gzip
    gzip off;

    # Cache
    proxy_cache_path /var/cache/nginx/hls levels=1:2 keys_zone=hls_cache:10m max_size=1g inactive=10m;

    # Upstream
    upstream mediamtx_hls {
        server 127.0.0.1:8188;
        keepalive 32;
    }

    upstream mediamtx_webrtc {
        server 127.0.0.1:8889;
        keepalive 32;
    }

    upstream api {
        server 127.0.0.1:5000;
        keepalive 16;
    }

    # Main server
    server {
        listen 8080;
        server_name _;

        # CORS
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS' always;
        add_header Access-Control-Allow-Headers 'Origin, X-Requested-With, Content-Type, Accept, Range' always;

        # Root
        location / {
            root /app/web;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # WebRTC
        location /webrtc/ {
            proxy_pass http://mediamtx_webrtc/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_buffering off;
        }

        # HLS
        location /hls/ {
            proxy_pass http://mediamtx_hls/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            
            proxy_cache hls_cache;
            proxy_cache_key $uri;
            proxy_cache_valid 200 3s;
            proxy_cache_lock on;
            
            location ~* \.m3u8$ {
                proxy_pass http://mediamtx_hls;
                proxy_cache_bypass 1;
                proxy_no_cache 1;
                add_header Cache-Control "no-cache";
            }
        }

        # API
        location /api/ {
            proxy_pass http://api/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Health
        location /health {
            access_log off;
            return 200 'OK';
            add_header Content-Type text/plain;
        }
    }
}
