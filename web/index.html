<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Player - Railway</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            overflow: hidden;
        }
        .container {
            display: flex;
            height: 100vh;
        }
        .sidebar {
            width: 350px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
        }
        .sidebar-header {
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .sidebar-header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        .search-box {
            width: 100%;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            color: #fff;
            font-size: 14px;
        }
        .channel-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        .channel-item {
            padding: 15px;
            margin-bottom: 5px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .channel-item:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateX(5px);
        }
        .channel-item.active {
            background: rgba(102, 126, 234, 0.5);
        }
        .player-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .player-header {
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .current-channel {
            font-size: 24px;
            font-weight: 600;
        }
        .btn {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 5px;
            color: #fff;
            cursor: pointer;
            margin-left: 10px;
        }
        .btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        .player-container {
            flex: 1;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #videoPlayer {
            width: 100%;
            height: 100%;
        }
        .placeholder {
            text-align: center;
        }
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                height: 40%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="sidebar-header">
                <h1>📺 IPTV Player</h1>
                <input type="text" class="search-box" id="searchBox" placeholder="Search channels...">
            </div>
            <div class="channel-list" id="channelList"></div>
        </div>
        <div class="player-area">
            <div class="player-header">
                <div class="current-channel" id="currentChannel">Select a channel</div>
                <div>
                    <button class="btn" id="webrtcBtn">WebRTC</button>
                    <button class="btn" id="hlsBtn">HLS</button>
                </div>
            </div>
            <div class="player-container">
                <div class="placeholder" id="placeholder">
                    <h2>📺</h2>
                    <p>Select a channel to start streaming</p>
                </div>
                <video id="videoPlayer" controls style="display: none;"></video>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        let channels = [];
        let currentMode = 'webrtc';
        let hls = null;
        let webrtcPc = null;

        const channelList = document.getElementById('channelList');
        const searchBox = document.getElementById('searchBox');
        const videoPlayer = document.getElementById('videoPlayer');
        const placeholder = document.getElementById('placeholder');
        const currentChannelEl = document.getElementById('currentChannel');
        const webrtcBtn = document.getElementById('webrtcBtn');
        const hlsBtn = document.getElementById('hlsBtn');

        async function init() {
            await loadChannels();
            webrtcBtn.addEventListener('click', () => switchMode('webrtc'));
            hlsBtn.addEventListener('click', () => switchMode('hls'));
            searchBox.addEventListener('input', handleSearch);
        }

        async function loadChannels() {
            try {
                const response = await fetch('/api/streams');
                const data = await response.json();
                channels = data.streams;
                renderChannels(channels);
            } catch (error) {
                console.error('Failed to load channels:', error);
            }
        }

        function renderChannels(channelsToRender) {
            channelList.innerHTML = '';
            channelsToRender.forEach(channel => {
                const item = document.createElement('div');
                item.className = 'channel-item';
                item.textContent = channel.name;
                item.addEventListener('click', () => playChannel(channel));
                channelList.appendChild(item);
            });
        }

        function handleSearch(e) {
            const query = e.target.value.toLowerCase();
            const filtered = channels.filter(ch => ch.name.toLowerCase().includes(query));
            renderChannels(filtered);
        }

        function playChannel(channel) {
            currentChannelEl.textContent = channel.name;
            placeholder.style.display = 'none';
            videoPlayer.style.display = 'block';
            
            stopStream();
            
            if (currentMode === 'webrtc') {
                playWebRTC(channel);
            } else {
                playHLS(channel);
            }
        }

        async function playWebRTC(channel) {
            const webrtcUrl = `/webrtc/${channel.id}/whep`;
            
            try {
                webrtcPc = new RTCPeerConnection({
                    iceServers: [{urls: 'stun:stun.l.google.com:19302'}]
                });
                
                webrtcPc.ontrack = (event) => {
                    videoPlayer.srcObject = event.streams[0];
                };
                
                webrtcPc.addTransceiver('video', {direction: 'recvonly'});
                webrtcPc.addTransceiver('audio', {direction: 'recvonly'});
                
                const offer = await webrtcPc.createOffer();
                await webrtcPc.setLocalDescription(offer);
                
                const response = await fetch(webrtcUrl, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/sdp'},
                    body: offer.sdp,
                });
                
                if (response.ok) {
                    const answerSdp = await response.text();
                    await webrtcPc.setRemoteDescription(new RTCSessionDescription({
                        type: 'answer',
                        sdp: answerSdp,
                    }));
                }
            } catch (error) {
                console.error('WebRTC error:', error);
                alert('Failed to play via WebRTC. Try HLS mode.');
            }
        }

        function playHLS(channel) {
            const hlsUrl = channel.hls_url;
            
            if (Hls.isSupported()) {
                hls = new Hls({
                    lowLatencyMode: true,
                    backBufferLength: 90,
                    maxBufferLength: 10,
                });
                
                hls.loadSource(hlsUrl);
                hls.attachMedia(videoPlayer);
                
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    videoPlayer.play();
                });
            } else if (videoPlayer.canPlayType('application/vnd.apple.mpegurl')) {
                videoPlayer.src = hlsUrl;
                videoPlayer.play();
            }
        }

        function stopStream() {
            if (webrtcPc) {
                webrtcPc.close();
                webrtcPc = null;
            }
            if (hls) {
                hls.destroy();
                hls = null;
            }
            videoPlayer.srcObject = null;
            videoPlayer.src = '';
        }

        function switchMode(mode) {
            currentMode = mode;
            webrtcBtn.style.background = mode === 'webrtc' ? 'rgba(102, 126, 234, 0.5)' : '';
            hlsBtn.style.background = mode === 'hls' ? 'rgba(102, 126, 234, 0.5)' : '';
        }

        init();
    </script>
</body>
</html>
